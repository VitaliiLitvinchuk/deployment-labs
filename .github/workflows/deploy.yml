name: Deploy to GitHub Pages
on:
    push:
      branches: [master]
jobs:
    build-and-deploy:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
        - name: Install and Build
          run: |
            cd lab-1/front
            npm install
            npm run build
        - name: Deploy
          uses: JamesIves/github-pages-deploy-action@v4
          with:
            folder: lab-1/front/out
  