apiVersion: v1
kind: Pod
metadata:
  name: redis
  labels:
    app: redis
spec:
  containers:
  - name: redis
    image: redis:latest
    ports:
    - containerPort: 6379
    volumeMounts:
    - name: redis-data
      mountPath: /data  # Шлях, де будемо створювати тестовий файл 
  volumes:
  - name: redis-data
    emptyDir: {}  # Ефемерне сховище, прив'язане до життя Pod